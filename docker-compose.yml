# Enterprise AI Logistics Solution - Developed by Mohammed Ghabban
version: '3.8'
services:
  ai-engine:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
  ui-dashboard:
    build:
      context: .
      dockerfile: Dockerfile.ui
    ports:
      - "8501:8501"
    environment:
      - BACKEND_URL=http://ai-engine:8000
    depends_on:
      - ai-engine
